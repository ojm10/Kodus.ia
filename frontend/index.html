<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodus.ia</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 600px; 
            margin: 0 auto; 
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 20px;
     }
        h1, p {
            text-align: center;
        }
        .chatbot-container { 
            border: 1px solid #444; 
            border-radius: 8px; 
            height: 500px; 
            display: flex; 
            flex-direction: column;
            background-color: #2d2d2d;
        }
        .chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            background: #1a1a1a;   
        }
        .message { 
            margin: 10px 0; 
            padding: 8px 12px; 
            border-radius: 5px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .user-message { 
            background: #007bff; 
            color: white; 
            text-align: right;
            margin-left: auto;
        }
        .bot-message { 
            background: #3d3d3d; 
            color: #e0e0e0;
            margin-right: auto;
        }
        .typing-indicator {
            background: #3d3d3d;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 5px;
            margin: 10px 0;
            max-width: 70%;
            font-style: italic;
        }
        .input-area { 
            display: flex; 
            padding: 10px; 
            border-top: 1px solid #444; 
        }
        input { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid #555; 
            border-radius: 4px;
            background-color: #2d2d2d;
            color: #ffffff;
        }
        button { 
            padding: 10px 20px; 
            margin-left: 10px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        button:hover {
            background: #0056b3;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Bem vindo ao Kodus</h1>
    <p>O professor que você não quer, mas que você precisa</p>
    
    <div class="chatbot-container">
        <div class="chat-messages" id="chatMessages">
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Digite sua mensagem..." />
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>
    <script>
        function typeMessage(text, elementId, callback) {
            const messagesDiv = document.getElementById(elementId);
            const typingDiv = messagesDiv.querySelector('.typing-indicator');
            
            if (typingDiv) {
                typingDiv.remove();
            }
            
            const botMsg = document.createElement('div');
            botMsg.className = 'message bot-message';
            messagesDiv.appendChild(botMsg);
            
            let index = 0;
            const speed = 40;

            function type() {
                if (index < text.length) {
                    botMsg.textContent += text.charAt(index);
                    index++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }
        
        function showTypingIndicator(elementId) {
            const messagesDiv = document.getElementById(elementId);
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.textContent = 'digitando...';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        window.addEventListener('load', function() {
            showTypingIndicator('chatMessages');
            setTimeout(() => {
                typeMessage('Fala ai novato, como vou salvar sua vida hoje?', 'chatMessages');
            }, 1000);
        });
        
        function sendMessage() {
            const input = document.getElementById('userInput');
            const messagesDiv = document.getElementById('chatMessages');
            
            if (input.value.trim()) {
                const userMsg = document.createElement('div');
                userMsg.className = 'message user-message';
                userMsg.textContent = input.value;
                messagesDiv.appendChild(userMsg);
                
                input.value = '';
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                 showTypingIndicator('chatMessages');
                setTimeout(() => {
                    typeMessage('Esta é uma resposta automática!', 'chatMessages');
                }, 1500);
            }
        }
    </script>

     <footer>
        <p>&copy; 2023 Kodus.ia. Todos os direitos reservados.</p>
     </footer>

</body>
</html>
